<mat-card class="status-card">
  <mat-card-header>
    <mat-card-title>Cistern status</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="level-ring" [style.--level]="status().level + '%'">
      <div class="level-ring__inner">
        <strong>{{ status().level }}%</strong>
        <span>Level</span>
      </div>
    </div>

    <mat-chip-set aria-label="Cistern status">
      <mat-chip class="status-chip" selected>
        <mat-icon matChipAvatar>check_circle</mat-icon>
        {{ status().status }}
      </mat-chip>
    </mat-chip-set>

    <div class="sensor-grid">
      <span><mat-icon>device_thermostat</mat-icon> Sensor temp.: <strong>{{ status().temperature }}°C</strong></span>
      <span><mat-icon>sensors</mat-icon> IoT signal: <strong>{{ status().signal }}</strong></span>
    </div>

    <button mat-flat-button class="refill-button" type="button">
      <mat-icon>add</mat-icon>
      Register refill
    </button>
  </mat-card-content>
</mat-card>
