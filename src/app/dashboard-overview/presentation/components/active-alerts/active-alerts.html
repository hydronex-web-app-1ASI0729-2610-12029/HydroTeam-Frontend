<mat-card class="alerts-card">
  <mat-card-header>
    <mat-card-title>Active alerts</mat-card-title>
    <button mat-button type="button">
      View all
      <mat-icon iconPositionEnd>arrow_forward</mat-icon>
    </button>
  </mat-card-header>

  <mat-card-content>
    @for (alert of alerts(); track alert.title) {
      <app-dashboard-alert-item [alert]="alert" />
    }
  </mat-card-content>
</mat-card>
